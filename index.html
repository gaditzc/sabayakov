<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1f2937" />
    <title>House App</title>
    <link rel="manifest" href="manifest.json" />
    <link rel="stylesheet" href="style.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js" defer></script>
    <script src="app.js" defer></script>
  </head>
  <body>
    <main class="app">
      <img
        src="assets/house.jpg"
        alt="House"
        class="house-image"
      />

      <section class="distance-card" aria-live="polite">
        <div class="distance-header">
          <span class="live-dot" aria-hidden="true"></span>
          <p class="distance-title">Live distance to Tchernichovsky 68</p>
        </div>
        <p id="distance-value" class="distance-value">--</p>
        <p id="distance-status" class="distance-status">Waiting for GPS signal...</p>
      </section>

      <section class="chart-card" aria-label="Navigation progress chart">
        <p class="chart-title">Navigation Progress</p>
        <div class="chart-shell">
          <canvas id="distance-chart"></canvas>
        </div>
      </section>
    </main>

    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", function () {
          navigator.serviceWorker.register("./sw.js").catch(function (error) {
            console.error("Service worker registration failed:", error);
          });
        });
      }
    </script>
  </body>
</html>
